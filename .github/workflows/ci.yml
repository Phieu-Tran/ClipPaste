name: CI
on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Build & lint
    strategy:
      fail-fast: false
      matrix:
        platform: ['windows-latest', 'ubuntu-22.04']
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      # Pinned to match the local dev toolchain so "CI green" == scripts/test.ps1
      # green. Newer stable Rust adds clippy lints (e.g. collapsible_match in
      # 1.96) that would fail here but not locally. Bump this when bumping local.
      - name: Install Rust 1.93.1
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93.1"
          components: clippy

      - name: Cache Rust dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Prettier check
        run: pnpm format:check

      - name: ESLint
        run: pnpm lint

      # Produces ../dist, which tauri's generate_context! embeds at compile time.
      # The Rust steps below fail without it.
      - name: Type-check & build frontend
        run: pnpm build

      # Strict lint on the primary dev platform (matches scripts/test.ps1).
      - name: Clippy (deny warnings)
        if: matrix.platform == 'windows-latest'
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

      # On Linux we only verify it compiles — Windows-only cfg blocks leave some
      # symbols unused here, so we don't enforce -D warnings on this platform.
      - name: Compile check (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        working-directory: src-tauri
        run: cargo build
