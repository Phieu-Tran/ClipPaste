<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Clipboard body gradient -->
    <linearGradient id="boardGrad" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#5BC0F8"/>
      <stop offset="50%" stop-color="#3BA3E0"/>
      <stop offset="100%" stop-color="#2B8BC9"/>
    </linearGradient>
    <!-- Clipboard side gradient (3D depth) -->
    <linearGradient id="sideGrad" x1="0" y1="0" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#2580B5"/>
      <stop offset="100%" stop-color="#1E6D9B"/>
    </linearGradient>
    <!-- Paper gradient -->
    <linearGradient id="paperGrad" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F0F4F8"/>
    </linearGradient>
    <!-- Clip metal gradient -->
    <linearGradient id="clipGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#78909C"/>
      <stop offset="40%" stop-color="#B0BEC5"/>
      <stop offset="60%" stop-color="#90A4AE"/>
      <stop offset="100%" stop-color="#607D8B"/>
    </linearGradient>
    <!-- Shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#1a5276" flood-opacity="0.3"/>
    </filter>
    <!-- Soft shadow for paper -->
    <filter id="paperShadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#1a5276" flood-opacity="0.15"/>
    </filter>
    <!-- Cheek blush -->
    <radialGradient id="blushL" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FF8FAB" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FF8FAB" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blushR" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FF8FAB" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FF8FAB" stop-opacity="0"/>
    </radialGradient>
    <!-- Shine highlight -->
    <linearGradient id="shine" x1="0" y1="0" x2="0.6" y2="0.6">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- === CLIPBOARD BODY === -->
  <g filter="url(#shadow)">
    <!-- Main board - rounded rectangle -->
    <rect x="98" y="90" width="316" height="370" rx="28" ry="28" fill="url(#boardGrad)"/>
    <!-- 3D edge (right + bottom) -->
    <path d="M386 118 Q414 90 414 118 L414 432 Q414 460 386 460 L126 460 Q98 460 98 432 L98 432 Q98 465 131 465 L381 465 Q419 465 419 427 L419 123 Q419 90 386 118 Z" fill="url(#sideGrad)" opacity="0.5"/>
    <!-- Highlight shine -->
    <rect x="98" y="90" width="316" height="370" rx="28" ry="28" fill="url(#shine)"/>
    <!-- Subtle border -->
    <rect x="98" y="90" width="316" height="370" rx="28" ry="28" fill="none" stroke="#2980B9" stroke-width="1.5" opacity="0.3"/>
  </g>

  <!-- === METAL CLIP AT TOP === -->
  <g>
    <!-- Clip base -->
    <rect x="188" y="62" width="136" height="56" rx="12" ry="12" fill="url(#clipGrad)"/>
    <!-- Clip inner cutout -->
    <rect x="210" y="74" width="92" height="32" rx="8" ry="8" fill="#455A64"/>
    <!-- Clip highlight -->
    <rect x="192" y="65" width="128" height="8" rx="4" ry="4" fill="#CFD8DC" opacity="0.6"/>
  </g>

  <!-- === PAPER SHEET (flying out, with content lines) === -->
  <g filter="url(#paperShadow)" transform="translate(10, -5) rotate(-3, 310, 300)">
    <!-- Paper -->
    <rect x="140" y="150" width="232" height="170" rx="8" ry="8" fill="url(#paperGrad)"/>
    <rect x="140" y="150" width="232" height="170" rx="8" ry="8" fill="none" stroke="#CFD8DC" stroke-width="1"/>

    <!-- Text lines on paper -->
    <rect x="162" y="178" width="140" height="8" rx="4" fill="#B0BEC5"/>
    <rect x="162" y="198" width="110" height="8" rx="4" fill="#CFD8DC"/>
    <rect x="162" y="218" width="160" height="8" rx="4" fill="#B0BEC5"/>
    <rect x="162" y="238" width="90" height="8" rx="4" fill="#CFD8DC"/>
    <rect x="162" y="258" width="130" height="8" rx="4" fill="#B0BEC5"/>
    <rect x="162" y="278" width="70" height="8" rx="4" fill="#CFD8DC"/>
  </g>

  <!-- === PASTE ARROW === -->
  <g transform="translate(295, 340)">
    <!-- Arrow body -->
    <path d="M0 0 C-25 -8 -45 5 -40 28 L-42 22 L-52 30 L-34 38 L-28 24 L-36 30 C-40 12 -22 2 0 8 Z"
          fill="#37474F" opacity="0.85"/>
  </g>

  <!-- === CUTE FACE === -->
  <g>
    <!-- Left eye -->
    <ellipse cx="208" cy="388" rx="16" ry="18" fill="#1A3A4A"/>
    <!-- Left eye highlight -->
    <ellipse cx="214" cy="381" rx="6" ry="7" fill="#FFFFFF"/>
    <ellipse cx="205" cy="393" rx="3" ry="3" fill="#FFFFFF" opacity="0.5"/>

    <!-- Right eye -->
    <ellipse cx="304" cy="388" rx="16" ry="18" fill="#1A3A4A"/>
    <!-- Right eye highlight -->
    <ellipse cx="310" cy="381" rx="6" ry="7" fill="#FFFFFF"/>
    <ellipse cx="301" cy="393" rx="3" ry="3" fill="#FFFFFF" opacity="0.5"/>

    <!-- Smile -->
    <path d="M232 415 Q256 440 280 415" fill="none" stroke="#1A3A4A" stroke-width="4" stroke-linecap="round"/>

    <!-- Blush cheeks -->
    <ellipse cx="185" cy="410" rx="18" ry="12" fill="url(#blushL)"/>
    <ellipse cx="327" cy="410" rx="18" ry="12" fill="url(#blushR)"/>
  </g>

  <!-- === SMALL SPARKLES === -->
  <g fill="#FFD54F" opacity="0.85">
    <!-- Sparkle top-right -->
    <path d="M420 80 L424 92 L436 96 L424 100 L420 112 L416 100 L404 96 L416 92 Z"/>
    <!-- Sparkle small top-left -->
    <path d="M70 120 L73 128 L81 131 L73 134 L70 142 L67 134 L59 131 L67 128 Z"/>
    <!-- Sparkle bottom-left -->
    <path d="M72 380 L75 388 L83 391 L75 394 L72 402 L69 394 L61 391 L69 388 Z"/>
  </g>
</svg>
